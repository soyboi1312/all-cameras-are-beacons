name: Android release

# Push a tag like v0.1.0 to build, sign, and publish a GitHub Release with the
# APK + AAB. A manual run (workflow_dispatch) builds and uploads the artifacts
# without publishing a release, which is a handy dry run for the secrets.
#
# Needs three repo secrets (Settings > Secrets and variables > Actions):
#   ACAB_KEYSTORE_BASE64  base64 of ~/keys/acab-release.jks
#   ACAB_STORE_PASSWORD   the keystore password
#   ACAB_KEY_PASSWORD     the key password (same as the store one if you pressed RETURN)
# The key alias is "acab" (set below); change it here if yours differs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # publish the Release and upload its assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode keystore
        env:
          ACAB_KEYSTORE_BASE64: ${{ secrets.ACAB_KEYSTORE_BASE64 }}
        run: echo "$ACAB_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/acab-release.jks"

      - name: Build signed APK and AAB
        working-directory: android
        env:
          ACAB_STORE_FILE: ${{ runner.temp }}/acab-release.jks
          ACAB_STORE_PASSWORD: ${{ secrets.ACAB_STORE_PASSWORD }}
          ACAB_KEY_ALIAS: acab
          ACAB_KEY_PASSWORD: ${{ secrets.ACAB_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Verify the APK is signed
        run: |
          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose android/app/build/outputs/apk/release/app-release.apk

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/beacons-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist/beacons-${GITHUB_REF_NAME}.aab"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beacons-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=("dist/beacons-${GITHUB_REF_NAME}.apk" "dist/beacons-${GITHUB_REF_NAME}.aab")
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Release already exists (a re-run, or a moved/force-pushed tag): refresh its
            # assets in place instead of failing on `gh release create`.
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber "${ASSETS[@]}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "All Cameras Are Beacons $GITHUB_REF_NAME" \
              --notes "Signed Android build for $GITHUB_REF_NAME. The .apk is for sideloading; the .aab is for Play Store upload." \
              --verify-tag \
              "${ASSETS[@]}"
          fi

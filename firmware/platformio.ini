; ACAB - All Cameras Are Beacons
; Two firmware builds from one shared core (lib/acab_core):
;   pio run -e oui-spy       app-controlled scanner w/ BLE GATT service
;   pio run -e mesh-detect   scanner that uplinks over a Heltec V3 Meshtastic node
;
; Hardware: Seeed XIAO ESP32-S3 (Colonel Panic OUI-Spy / Mesh-Detect).

[platform]
; pinned to match the base oui-spy project

[env]
platform        = espressif32@^6.5.0
board           = seeed_xiao_esp32s3
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
board_build.f_cpu       = 240000000L

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; let detection JSON ride a larger ATT MTU
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=247

; Shared across both builds. NimBLE drives scan + (oui-spy) GATT server.
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1

; -----------------------------------------------------------------------------
; OUI-Spy: app-controlled. Compiles src/oui-spy/* only.
; -----------------------------------------------------------------------------
[env:oui-spy]
build_src_filter = -<*> +<oui-spy/>
lib_deps =
    ${env.lib_deps}
    bblanchon/ArduinoJson@^7.0.4

; -----------------------------------------------------------------------------
; Mesh-Detect: meshtastic uplink. Compiles src/mesh-detect/* only.
; Hand-rolls the Meshtastic protobuf, so no extra deps beyond the core.
; -----------------------------------------------------------------------------
[env:mesh-detect]
build_src_filter = -<*> +<mesh-detect/>
lib_deps =
    ${env.lib_deps}

; -----------------------------------------------------------------------------
; Mesh-Detect (private channel): identical to mesh-detect but pinned to channel
; index 1 (PROTO transport). Powers the web flasher's private-channel button so
; people can flash the private build without PlatformIO. The Heltec still needs
; its acab channel + PROTO Serial Module set up to match (see docs/mesh-setup.md).
; -----------------------------------------------------------------------------
[env:mesh-detect-ch1]
extends = env:mesh-detect
build_flags =
    ${env.build_flags}
    -DACAB_MESH_CHANNEL=1
